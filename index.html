<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocal Commerce BJ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ===== VARIABLES & RESET ===== */
        :root {
            --vert: #004d00;
            --vert2: #006400;
            --couleur-or: #FFD700;
            --or2: #FF8C00;
            --blanc: #ffffff;
            --gris: #f4f4f4;
            --texte: #333333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--gris);
            color: var(--texte);
        }

        /* ===== NAVBAR ORIGINELLE ===== */
        nav {
            background-color: var(--vert);
            color: var(--blanc);
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 24px;
            font-weight: bold;
            color: var(--couleur-or);
            text-decoration: none;
        }

        .logo img {
            width: 40px;
            height: 40px;
            object-fit: cover;
            border-radius: 50%;
            border: 2px solid var(--couleur-or);
        }

        .nav-links {
            display: flex;
            align-items: center;
            list-style: none;
            gap: 25px;
        }

        .nav-links a {
            color: var(--blanc);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--couleur-or);
        }

        .panier {
            background-color: var(--couleur-or);
            color: var(--vert) !important;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold !important;
        }

        /* ===== BOUTON BURGER MODERNE ===== */
        .burger-menu {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            background: none;
            border: none;
        }

        .burger-menu span {
            display: block;
            width: 25px;
            height: 3px;
            background-color: var(--blanc);
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        /* ===== HERO SECTION ORIGINELLE ===== */
        .hero {
            background: linear-gradient(rgba(0, 77, 0, 0.85), rgba(0, 100, 0, 0.9)), url('hero-bg.jpg') center/cover;
            color: var(--blanc);
            padding: 80px 20px;
            text-align: center;
        }

        .hero h1 {
            font-size: 42px;
            margin-bottom: 15px;
        }

        .hero h1 span {
            color: var(--couleur-or);
        }

        .hero p {
            font-size: 18px;
            margin-bottom: 30px;
        }

        /* ===== ZONE DE RECHERCHE INTEGRÉE ===== */
        .search-box {
            max-width: 550px;
            margin: 0 auto 30px;
            display: flex;
            background: var(--blanc);
            padding: 6px;
            border-radius: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .search-box input {
            flex: 1;
            border: none;
            outline: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 30px 0 0 30px;
        }

        .search-box button {
            background: var(--vert);
            color: var(--blanc);
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
        }

        .search-box button:hover {
            background: var(--vert2);
        }

        .hero-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        /* ===== BOUTON VOCAL D'ORIGINE AVEC PULSATION ===== */
        .btn-voix {
            background-color: var(--couleur-or);
            color: var(--vert);
            padding: 14px 30px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: background-color 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-voix:hover {
            background-color: var(--blanc);
            color: var(--vert);
        }

        .btn-voix.active {
            background-color: #ff4444;
            color: var(--blanc);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* ===== GRILLE DE PRODUITS ET PHOTOS REELLES ===== */
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .section-title {
            text-align: center;
            color: var(--vert);
            margin-bottom: 30px;
            font-size: 28px;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

        .product-card {
            background: var(--blanc);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .product-card:hover {
            transform: translateY(-5px);
        }

        .product-img-box {
            width: 100%;
            height: 240px;
            background-color: #e0e0e0;
        }

        .product-img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Ajuste proprement la photo sans la déformer */
        }

        .product-details {
            padding: 20px;
        }

        .product-name {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .product-price {
            color: var(--or2);
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .btn-buy {
            width: 100%;
            background-color: var(--vert);
            color: var(--blanc);
            border: none;
            padding: 10px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-buy:hover {
            background-color: var(--vert2);
        }

        /* ===== RESPONSIVE TABLETTE & MOBILE ===== */
        @media (max-width: 768px) {
            .burger-menu {
                display: flex;
            }

            .nav-links {
                position: fixed;
                top: 70px;
                right: -100%;
                width: 70%;
                height: calc(100vh - 70px);
                background-color: var(--vert);
                flex-direction: column;
                padding: 40px 20px;
                gap: 25px;
                transition: right 0.4s ease;
                box-shadow: -5px 0 10px rgba(0,0,0,0.1);
            }

            .nav-links.open {
                right: 0;
            }

            .burger-menu.open span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
            .burger-menu.open span:nth-child(2) { opacity: 0; }
            .burger-menu.open span:nth-child(3) { transform: rotate(-45deg) translate(6px, -6px); }
        }
    </style>
</head>
<body>

    <nav>
        <a href="#" class="logo">
            <img src="logo.png" alt="Logo" onerror="this.src='https://via.placeholder.com/40?text=VB'">
            Vocal Commerce
        </a>

        <button class="burger-menu" id="burger">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <ul class="nav-links" id="navLinks">
            <li><a href="#">Accueil</a></li>
            <li><a href="#">Boutiques</a></li>
            <li><a href="#">Catégories</a></li>
            <li><a href="#" class="panier"><i class="fa-solid fa-basket-shopping"></i> Panier (0)</a></li>
        </ul>
    </nav>

    <header class="hero">
        <h1>Achetez avec votre <span>Voix</span></h1>
        <p>La première plateforme e-commerce vocale adaptée au Bénin.</p>

        <div class="search-box">
            <input type="text" placeholder="Rechercher un produit, une catégorie...">
            <button><i class="fa-solid fa-magnifying-glass"></i></button>
        </div>

        <div class="hero-buttons">
            <button class="btn-voix" id="vocalBtn">
                <i class="fa-solid fa-microphone"></i> Activer la voix
            </button>
        </div>
    </header>

    <main class="container">
        <h2 class="section-title">Articles Disponibles</h2>
        
        <div class="products-grid">
            <div class="product-card">
                <div class="product-img-box">
                    <img src="produit1.jpg" alt="Article 1" onerror="this.src='https://via.placeholder.com/300x240?text=Photo+Réelle+Article+1'">
                </div>
                <div class="product-details">
                    <div class="product-name">Riz Local Premium du Bénin</div>
                    <div class="product-price">12 500 FCFA</div>
                    <button class="btn-buy">Ajouter au panier</button>
                </div>
            </div>

            <div class="product-card">
                <div class="product-img-box">
                    <img src="produit2.jpg" alt="Article 2" onerror="this.src='https://via.placeholder.com/300x240?text=Photo+Réelle+Article+2'">
                </div>
                <div class="product-details">
                    <div class="product-name">Huile d'Arachide Pure (5L)</div>
                    <div class="product-price">6 000 FCFA</div>
                    <button class="btn-buy">Ajouter au panier</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Gestion du menu mobile (Burger)
        const burger = document.getElementById('burger');
        const navLinks = document.getElementById('navLinks');

        burger.addEventListener('click', () => {
            burger.classList.toggle('open');
            navLinks.classList.toggle('open');
        });

        // Gestion de l'état actif du bouton vocal (comme configuré dans votre CSS)
        const vocalBtn = document.getElementById('vocalBtn');
        vocalBtn.addEventListener('click', () => {
            vocalBtn.classList.toggle('active');
            if(vocalBtn.classList.contains('active')) {
                vocalBtn.innerHTML = '<i class="fa-solid fa-circle-stop"></i> Écoute en cours...';
            } else {
                vocalBtn.innerHTML = '<i class="fa-solid fa-microphone"></i> Activer la voix';
            }
        });
    </script>
</body>
</html>
