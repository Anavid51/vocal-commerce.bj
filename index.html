<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vocal Commerce BJ – Téléphones & Électronique</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --vert: #006400;
      --vert2: #228B22;
      --or: #FFD700;
      --or2: #FFA500;
      --blanc: #ffffff;
      --gris: #f4f4f4;
      --texte: #1a1a1a;
      --ombre: 0 4px 20px rgba(0,0,0,0.1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Poppins', sans-serif; background: var(--gris); color: var(--texte); }

    /* ===== NAVBAR ===== */
    nav {
      background: var(--vert);
      padding: 12px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: 0 2px 15px rgba(0,0,0,0.3);
    }
    .logo-container {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-icon {
      width: 45px;
      height: 45px;
      background: var(--or);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 800;
      color: var(--vert);
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.1;
    }
    .logo-text span:first-child {
      color: var(--or);
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: 1px;
    }
    .logo-text span:last-child {
      color: rgba(255,255,255,0.8);
      font-size: 0.7rem;
      font-weight: 300;
    }
    nav ul {
      list-style: none;
      display: flex;
      gap: 5px;
      align-items: center;
    }
    nav ul li a {
      color: white;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
      padding: 8px 14px;
      border-radius: 20px;
      transition: all 0.3s;
    }
    nav ul li a:hover { background: rgba(255,255,255,0.15); color: var(--or); }
    .nav-panier {
      background: var(--or) !important;
      color: var(--vert) !important;
      font-weight: 700 !important;
      position: relative;
    }
    .nav-panier:hover { background: var(--or2) !important; }
    #badge-panier {
      position: absolute;
      top: -5px;
      right: -5px;
      background: red;
      color: white;
      border-radius: 50%;
      width: 18px;
      height: 18px;
      font-size: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      display: none;
    }

    /* ===== HERO ===== */
    .hero {
      background: linear-gradient(135deg, #004d00 0%, #006400 50%, #228B22 100%);
      color: white;
      text-align: center;
      padding: 80px 20px 60px;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,215,0,0.05) 0%, transparent 60%);
      animation: rotate 20s linear infinite;
    }
    @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .hero-badge {
      display: inline-block;
      background: rgba(255,215,0,0.2);
      border: 1px solid rgba(255,215,0,0.4);
      color: var(--or);
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 20px;
      letter-spacing: 1px;
    }
    .hero h1 {
      font-size: 2.8rem;
      font-weight: 800;
      margin-bottom: 15px;
      line-height: 1.2;
    }
    .hero h1 span { color: var(--or); }
    .hero p {
      font-size: 1.1rem;
      max-width: 550px;
      margin: 0 auto 35px;
      opacity: 0.85;
      font-weight: 300;
    }
    .hero-buttons {
      display: flex;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
    }
    .btn-voix {
      background: var(--or);
      color: var(--vert);
      border: none;
      padding: 16px 35px;
      font-size: 1rem;
      font-weight: 700;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(255,215,0,0.4);
      transition: all 0.3s;
      font-family: 'Poppins', sans-serif;
    }
    .btn-voix:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(255,215,0,0.5); }
    .btn-voix.active { background: #ff4444; color: white; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
    .btn-produits {
      background: transparent;
      color: white;
      border: 2px solid rgba(255,255,255,0.5);
      padding: 16px 35px;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s;
      font-family: 'Poppins', sans-serif;
    }
    .btn-produits:hover { background: rgba(255,255,255,0.1); border-color: white; }
    #voice-result {
      margin-top: 20px;
      font-size: 0.9rem;
      background: rgba(255,255,255,0.1);
      display: inline-block;
      padding: 10px 25px;
      border-radius: 25px;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .hero-stats {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-top: 50px;
      flex-wrap: wrap;
    }
    .stat { text-align: center; }
    .stat-num { font-size: 1.8rem; font-weight: 800; color: var(--or); }
    .stat-label { font-size: 0.75rem; opacity: 0.7; font-weight: 300; }

    /* ===== BANDEAU AUTEUR ===== */
    .auteur {
      background: var(--or);
      padding: 10px;
      text-align: center;
      font-weight: 700;
      color: var(--vert);
      font-size: 0.9rem;
    }

    /* ===== RECHERCHE ===== */
    .recherche-section {
      background: white;
      padding: 25px 20px;
      box-shadow: var(--ombre);
    }
    .recherche-inner {
      max-width: 700px;
      margin: 0 auto;
      display: flex;
      gap: 10px;
    }
    .recherche-inner input {
      flex: 1;
      padding: 14px 20px;
      border: 2px solid #e0e0e0;
      border-radius: 30px;
      font-size: 0.95rem;
      outline: none;
      font-family: 'Poppins', sans-serif;
      transition: border 0.3s;
    }
    .recherche-inner input:focus { border-color: var(--vert); }
    .recherche-inner button {
      padding: 14px 20px;
      background: var(--vert);
      color: white;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      font-size: 1.1rem;
      transition: all 0.3s;
    }
    .recherche-inner button:hover { background: var(--vert2); transform: scale(1.05); }

    /* ===== CATEGORIES ===== */
    .categories-section {
      background: white;
      padding: 15px 20px;
      border-bottom: 2px solid #eee;
      position: sticky;
      top: 70px;
      z-index: 100;
    }
    .categories-inner {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      max-width: 900px;
      margin: 0 auto;
    }
    .categories-inner button {
      padding: 9px 18px;
      border: 2px solid var(--vert);
      background: white;
      color: var(--vert);
      border-radius: 25px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      transition: all 0.3s;
      font-family: 'Poppins', sans-serif;
    }
    .categories-inner button.active,
    .categories-inner button:hover {
      background: var(--vert);
      color: white;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(0,100,0,0.3);
    }

    /* ===== TITRE SECTION ===== */
    .titre-section {
      text-align: center;
      padding: 30px 20px 10px;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--vert);
    }

    /* ===== GRILLE PRODUITS ===== */
    .grille {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 20px;
      padding: 20px 30px 50px;
      max-width: 1300px;
      margin: 0 auto;
    }

    .carte {
      background: white;
      border-radius: 16px;
      box-shadow: 0 2px 15px rgba(0,0,0,0.08);
      overflow: hidden;
      transition: all 0.3s;
      position: relative;
    }
    .carte:hover { transform: translateY(-6px); box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
    .carte-badge {
      position: absolute;
      top: 12px;
      left: 12px;
      background: var(--or);
      color: var(--vert);
      padding: 4px 10px;
      border-radius: 10px;
      font-size: 0.7rem;
      font-weight: 700;
      z-index: 1;
    }
    .carte-img {
      width: 100%;
      height: 200px;
      object-fit: contain;
      background: linear-gradient(135deg, #f8f8f8, #efefef);
      padding: 15px;
    }
    .carte-info { padding: 15px; }
    .carte-info h3 { font-size: 0.95rem; font-weight: 700; margin-bottom: 5px; color: #1a1a1a; }
    .carte-info p { font-size: 0.8rem; color: #888; margin-bottom: 12px; line-height: 1.4; }
    .carte-footer { display: flex; justify-content: space-between; align-items: center; }
    .prix { font-size: 1.1rem; font-weight: 800; color: var(--vert); }
    .btn-panier {
      background: var(--vert);
      color: white;
      border: none;
      padding: 9px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 600;
      transition: all 0.3s;
      font-family: 'Poppins', sans-serif;
    }
    .btn-panier:hover { background: var(--or); color: var(--vert); transform: scale(1.05); }

    /* ===== PANIER MODAL ===== */
    .panier-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 2000;
      justify-content: center;
      align-items: flex-start;
      padding-top: 60px;
    }
    .panier-overlay.open { display: flex; }
    .panier-modal {
      background: white;
      border-radius: 20px;
      width: 90%;
      max-width: 500px;
      max-height: 80vh;
      overflow-y: auto;
      padding: 25px;
      position: relative;
    }
    .panier-modal h2 {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--vert);
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .fermer-panier {
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: #888;
    }
    .panier-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid #eee;
    }
    .panier-item img {
      width: 60px;
      height: 60px;
      object-fit: contain;
      background: #f5f5f5;
      border-radius: 10px;
      padding: 5px;
    }
    .panier-item-info { flex: 1; }
    .panier-item-info h4 { font-size: 0.85rem; font-weight: 600; }
    .panier-item-info p { font-size: 0.8rem; color: var(--vert); font-weight: 700; }
    .btn-supprimer {
      background: #ff4444;
      color: white;
      border: none;
      border-radius: 50%;
      width: 28px;
      height: 28px;
      cursor: pointer;
      font-size: 0.8rem;
    }
    .panier-total {
      background: var(--gris);
      border-radius: 12px;
      padding: 15px;
      margin-top: 15px;
      text-align: right;
    }
    .panier-total strong { font-size: 1.2rem; color: var(--vert); }
    .btn-commander-panier {
      width: 100%;
      padding: 15px;
      background: var(--vert);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 15px;
      font-family: 'Poppins', sans-serif;
      transition: all 0.3s;
    }
    .btn-commander-panier:hover { background: var(--vert2); }
    .panier-vide { text-align: center; padding: 30px; color: #888; font-size: 1rem; }

    /* ===== ADMIN MODAL ===== */
    .admin-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.6);
      z-index: 3000;
      justify-content: center;
      align-items: center;
    }
    .admin-overlay.open { display: flex; }
    .admin-modal {
      background: white;
      border-radius: 20px;
      width: 90%;
      max-width: 600px;
      max-height: 85vh;
      overflow-y: auto;
      padding: 30px;
    }
    .admin-modal h2 {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--vert);
      margin-bottom: 25px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .admin-login { text-align: center; }
    .admin-login input {
      width: 100%;
      padding: 14px;
      border: 2px solid #ddd;
      border-radius: 12px;
      font-size: 1rem;
      margin-bottom: 15px;
      font-family: 'Poppins', sans-serif;
      outline: none;
    }
    .admin-login input:focus { border-color: var(--vert); }
    .btn-login {
      width: 100%;
      padding: 14px;
      background: var(--vert);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Poppins', sans-serif;
    }
    .admin-panel { display: none; }
    .commandes-liste { margin-top: 15px; }
    .commande-item {
      background: var(--gris);
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 10px;
      border-left: 4px solid var(--vert);
    }
    .commande-item h4 { font-size: 0.9rem; font-weight: 700; color: var(--vert); }
    .commande-item p { font-size: 0.85rem; color: #555; margin-top: 5px; }

    /* ===== SECTION A PROPOS ===== */
    .apropos {
      background: white;
      padding: 60px 20px;
      text-align: center;
    }
    .apropos h2 { font-size: 1.8rem; font-weight: 800; color: var(--vert); margin-bottom: 30px; }
    .apropos-carte {
      display: inline-block;
      background: linear-gradient(135deg, #f0fff0, #e8f5e9);
      border-radius: 20px;
      padding: 40px;
      max-width: 500px;
      box-shadow: var(--ombre);
      border: 2px solid rgba(0,100,0,0.1);
    }
    .apropos-carte .avatar { font-size: 70px; margin-bottom: 15px; }
    .apropos-carte h3 { font-size: 1.4rem; font-weight: 800; color: var(--vert); margin-bottom: 5px; }
    .apropos-carte .titre-dev { font-size: 0.9rem; color: #888; margin-bottom: 20px; }
    .apropos-carte p { font-size: 0.9rem; color: #555; line-height: 1.7; margin-bottom: 20px; }
    .apropos-infos { background: white; border-radius: 12px; padding: 15px; margin-bottom: 20px; text-align: left; }
    .apropos-infos p { margin-bottom: 8px; font-size: 0.9rem; color: #333; }
    .apropos-infos p span { font-weight: 700; color: var(--vert); }
    .apropos-badges { display: flex; justify-content: center; flex-wrap: wrap; gap: 8px; }
    .badge { background: var(--vert); color: white; padding: 6px 14px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; }

    /* ===== CONTACT ===== */
    .contact {
      background: linear-gradient(135deg, #004d00, var(--vert));
      color: white;
      text-align: center;
      padding: 60px 20px;
    }
    .contact h2 { font-size: 1.8rem; font-weight: 800; margin-bottom: 10px; }
    .contact p { opacity: 0.8; margin-bottom: 30px; }
    .contact-liens { display: flex; justify-content: center; flex-wrap: wrap; gap: 12px; }
    .contact-liens a {
      display: inline-block;
      padding: 14px 25px;
      border-radius: 30px;
      font-size: 0.9rem;
      font-weight: 700;
      text-decoration: none;
      transition: all 0.3s;
    }
    .contact-liens a:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
    .btn-whatsapp { background: #25D366; color: white; }
    .btn-tel1 { background: var(--or); color: var(--vert); }
    .btn-tel2 { background: var(--or2); color: white; }
    .btn-email { background: white; color: var(--vert); }

    /* ===== VENDEUR ===== */
    .vendeur {
      background: #f9f9f9;
      padding: 0 0 60px;
    }
    .vendeur-hero {
      background: linear-gradient(135deg, #004d00, #006400, #228B22);
      color: white;
      text-align: center;
      padding: 70px 20px 50px;
    }
    .vendeur-hero-badge {
      display: inline-block;
      background: rgba(255,215,0,0.2);
      border: 1px solid rgba(255,215,0,0.5);
      color: var(--or);
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 20px;
      letter-spacing: 1px;
    }
    .vendeur-hero h2 {
      font-size: 2.2rem;
      font-weight: 800;
      margin-bottom: 15px;
      line-height: 1.2;
    }
    .vendeur-hero h2 span { color: var(--or); }
    .vendeur-hero .sous-titre {
      font-size: 1rem;
      opacity: 0.85;
      max-width: 550px;
      margin: 0 auto 35px;
      line-height: 1.6;
    }
    .vendeur-stats {
      display: flex;
      justify-content: center;
      gap: 40px;
      flex-wrap: wrap;
    }
    .v-stat { text-align: center; }
    .v-stat-num { font-size: 1.8rem; font-weight: 800; color: var(--or); }
    .v-stat-label { font-size: 0.75rem; opacity: 0.8; }

    .vendeur-section {
      max-width: 1100px;
      margin: 50px auto 0;
      padding: 0 20px;
    }
    .vendeur-section-titre {
      text-align: center;
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--vert);
      margin-bottom: 30px;
    }

    .vendeur-avantages {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
    }
    .avantage {
      background: white;
      border-radius: 16px;
      padding: 25px 20px;
      width: 180px;
      box-shadow: var(--ombre);
      border-top: 4px solid var(--or);
      text-align: center;
      transition: transform 0.3s;
    }
    .avantage:hover { transform: translateY(-5px); }
    .avantage .icone { font-size: 2rem; margin-bottom: 10px; }
    .avantage h4 { font-size: 0.9rem; font-weight: 700; color: var(--vert); margin-bottom: 5px; }
    .avantage p { font-size: 0.78rem; color: #888; line-height: 1.4; }

    .plans {
      display: flex;
      justify-content: center;
      gap: 25px;
      flex-wrap: wrap;
    }
    .plan {
      background: white;
      border-radius: 20px;
      padding: 30px 25px;
      width: 280px;
      box-shadow: var(--ombre);
      text-align: center;
      position: relative;
      border: 2px solid #eee;
      transition: transform 0.3s;
    }
    .plan:hover { transform: translateY(-5px); }
    .plan-pro {
      border: 2px solid var(--or);
      box-shadow: 0 8px 30px rgba(255,215,0,0.3);
    }
    .plan-badge-pro {
      position: absolute;
      top: -12px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--or);
      color: var(--vert);
      padding: 4px 16px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 800;
    }
    .plan-nom { font-size: 1.2rem; font-weight: 800; color: var(--vert); margin-bottom: 10px; }
    .plan-prix { font-size: 2rem; font-weight: 800; color: var(--vert); margin-bottom: 20px; }
    .plan-prix span { font-size: 0.85rem; color: #888; font-weight: 400; }
    .plan-features { list-style: none; text-align: left; margin-bottom: 25px; }
    .plan-features li { font-size: 0.85rem; color: #555; padding: 6px 0; border-bottom: 1px solid #f0f0f0; }
    .btn-plan {
      width: 100%;
      padding: 13px;
      background: var(--vert);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Poppins', sans-serif;
      transition: all 0.3s;
    }
    .btn-plan:hover { background: var(--vert2); }
    .btn-plan-pro { background: var(--or); color: var(--vert); }
    .btn-plan-pro:hover { background: var(--or2); color: white; }

    .temoignages {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    .temoignage {
      b
